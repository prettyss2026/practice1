<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구구단 연습 게임</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nanum Gothic', '맑은 고딕', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .game-box {
      background: white;
      border-radius: 30px;
      padding: 40px 36px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      color: #5c35a5;
      margin-bottom: 6px;
      letter-spacing: -1px;
    }

    .subtitle {
      color: #aaa;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    /* 점수판 */
    .scoreboard {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .score-card {
      background: #f3f0ff;
      border-radius: 16px;
      padding: 12px 24px;
      min-width: 100px;
    }

    .score-card .label {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 2px;
    }

    .score-card .value {
      font-size: 2rem;
      font-weight: bold;
      color: #5c35a5;
    }

    /* 문제 영역 */
    .question-area {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      border-radius: 24px;
      padding: 30px 20px;
      margin-bottom: 24px;
    }

    .dan-badge {
      display: inline-block;
      background: rgba(255,255,255,0.5);
      border-radius: 20px;
      padding: 4px 16px;
      font-size: 0.85rem;
      color: #a03060;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .question-text {
      font-size: 3rem;
      font-weight: bold;
      color: #5c1a1a;
      letter-spacing: 2px;
    }

    /* 입력 */
    .answer-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    #answerInput {
      flex: 1;
      font-size: 2rem;
      padding: 14px 20px;
      border: 3px solid #d0c0f0;
      border-radius: 16px;
      outline: none;
      text-align: center;
      color: #333;
      transition: border-color 0.2s;
    }

    #answerInput:focus { border-color: #7c4dff; }

    #submitBtn {
      background: linear-gradient(135deg, #7c4dff, #651fff);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 14px 26px;
      font-size: 1.4rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 15px rgba(124,77,255,0.4);
    }

    #submitBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124,77,255,0.5); }
    #submitBtn:active { transform: translateY(0); }

    /* 피드백 */
    .feedback {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 20px;
      transition: all 0.3s;
      padding: 10px;
    }

    .feedback.correct {
      background: #e8f5e9;
      color: #2e7d32;
      animation: pop 0.3s ease;
    }

    .feedback.wrong {
      background: #fce4ec;
      color: #c62828;
      animation: shake 0.3s ease;
    }

    .feedback.empty { background: transparent; }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* 단 선택 버튼 */
    .dan-section {
      border-top: 2px dashed #eee;
      padding-top: 20px;
    }

    .dan-label {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 12px;
    }

    .dan-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .dan-btn {
      padding: 10px 18px;
      border: 2.5px solid;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
      background: white;
    }

    .dan-btn:hover { filter: brightness(0.95); transform: translateY(-1px); }
    .dan-btn.active { color: white !important; border-color: transparent !important; }

    /* 색상 팔레트 */
    .dan-btn:nth-child(1) { color:#e53935; border-color:#e53935; }
    .dan-btn:nth-child(1).active { background:#e53935; }
    .dan-btn:nth-child(2) { color:#e67e22; border-color:#e67e22; }
    .dan-btn:nth-child(2).active { background:#e67e22; }
    .dan-btn:nth-child(3) { color:#f1c40f; border-color:#f1c40f; }
    .dan-btn:nth-child(3).active { background:#f1c40f; color:#333 !important; }
    .dan-btn:nth-child(4) { color:#27ae60; border-color:#27ae60; }
    .dan-btn:nth-child(4).active { background:#27ae60; }
    .dan-btn:nth-child(5) { color:#2980b9; border-color:#2980b9; }
    .dan-btn:nth-child(5).active { background:#2980b9; }
    .dan-btn:nth-child(6) { color:#8e44ad; border-color:#8e44ad; }
    .dan-btn:nth-child(6).active { background:#8e44ad; }
    .dan-btn:nth-child(7) { color:#e91e63; border-color:#e91e63; }
    .dan-btn:nth-child(7).active { background:#e91e63; }
    .dan-btn:nth-child(8) { color:#00897b; border-color:#00897b; }
    .dan-btn:nth-child(8).active { background:#00897b; }
    .dan-btn:nth-child(9) { color:#546e7a; border-color:#546e7a; }
    .dan-btn:nth-child(9).active { background:#546e7a; }

    /* 다음 문제 버튼 */
    #nextBtn {
      display: none;
      width: 100%;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: #1a5c3a;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 1.3rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(67,233,123,0.4);
      transition: transform 0.1s;
    }

    #nextBtn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
<div class="game-box">
  <h1>🌟 구구단 게임 🌟</h1>
  <p class="subtitle">정답을 맞혀서 점수를 올려보세요!</p>

  <div class="scoreboard">
    <div class="score-card">
      <div class="label">🏆 점수</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-card">
      <div class="label">📝 문제 수</div>
      <div class="value" id="total">0</div>
    </div>
  </div>

  <div class="question-area">
    <div class="dan-badge" id="danBadge">2단</div>
    <div class="question-text" id="questionText">2 × 3 = ?</div>
  </div>

  <div class="answer-row">
    <input type="number" id="answerInput" placeholder="?" min="0" max="99" autofocus>
    <button id="submitBtn" onclick="checkAnswer()">확인 ✓</button>
  </div>

  <div class="feedback empty" id="feedback"></div>

  <button id="nextBtn" onclick="nextQuestion()">다음 문제 ➡️</button>

  <div class="dan-section">
    <div class="dan-label">연습할 단을 선택하세요 (복수 선택 가능)</div>
    <div class="dan-buttons" id="danButtons"></div>
  </div>
</div>

<script>
  const PRAISE = [
    "🎉 완벽해요! 천재!",
    "⭐ 정말 잘했어요!",
    "🥳 대단해요! 브라보!",
    "🏆 훌륭해요! 최고!",
    "🎊 맞았어요! 짱이에요!",
    "🌟 와! 대박이에요!",
    "💪 멋져요! 계속 해봐요!",
    "🐥 너무 잘하는걸요!",
  ];

  const WRONG_MSG = [
    "🙁 아쉬워요! 다시 도전!",
    "😅 틀렸어요. 파이팅!",
    "💡 조금만 더 생각해요!",
    "🔁 아깝다! 다시 해봐요!",
  ];

  let selectedDans = [2, 3, 4, 5, 6, 7, 8, 9];
  let score = 0;
  let total = 0;
  let currentA, currentB, currentAnswer;
  let answered = false;

  function buildDanButtons() {
    const container = document.getElementById('danButtons');
    for (let d = 2; d <= 9; d++) {
      const btn = document.createElement('button');
      btn.className = 'dan-btn active';
      btn.textContent = d + '단';
      btn.dataset.dan = d;
      btn.onclick = () => toggleDan(d, btn);
      container.appendChild(btn);
    }
  }

  function toggleDan(d, btn) {
    const idx = selectedDans.indexOf(d);
    if (idx === -1) {
      selectedDans.push(d);
      btn.classList.add('active');
    } else {
      if (selectedDans.length === 1) return; // 최소 1개
      selectedDans.splice(idx, 1);
      btn.classList.remove('active');
    }
    nextQuestion();
  }

  function newQuestion() {
    const dan = selectedDans[Math.floor(Math.random() * selectedDans.length)];
    const b = Math.floor(Math.random() * 9) + 1;
    currentA = dan;
    currentB = b;
    currentAnswer = dan * b;

    document.getElementById('danBadge').textContent = dan + '단';
    document.getElementById('questionText').textContent = `${dan} × ${b} = ?`;
    document.getElementById('answerInput').value = '';
    document.getElementById('answerInput').focus();
    setFeedback('', 'empty');
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('submitBtn').style.display = 'inline-block';
    answered = false;
  }

  function checkAnswer() {
    if (answered) return;
    const val = document.getElementById('answerInput').value.trim();
    if (val === '') return;

    const userAns = parseInt(val, 10);
    total++;
    document.getElementById('total').textContent = total;
    answered = true;

    if (userAns === currentAnswer) {
      score++;
      document.getElementById('score').textContent = score;
      const msg = PRAISE[Math.floor(Math.random() * PRAISE.length)];
      setFeedback(msg, 'correct');
    } else {
      const msg = WRONG_MSG[Math.floor(Math.random() * WRONG_MSG.length)]
        + `  (정답: ${currentAnswer})`;
      setFeedback(msg, 'wrong');
    }

    document.getElementById('submitBtn').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'block';
  }

  function nextQuestion() {
    newQuestion();
  }

  function setFeedback(msg, type) {
    const el = document.getElementById('feedback');
    el.textContent = msg;
    el.className = 'feedback ' + type;
  }

  document.getElementById('answerInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (answered) nextQuestion();
      else checkAnswer();
    }
  });

  buildDanButtons();
  newQuestion();
</script>
</body>
</html>
